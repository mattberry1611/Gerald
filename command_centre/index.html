<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerald Command Centre</title>
<style>
body{margin:0;background:#030712;color:white;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.orb-wrapper{margin-top:28px;display:flex;flex-direction:column;align-items:center;gap:2px}
#orb-canvas{display:block}
.orb-title{font-size:26px;font-weight:bold;letter-spacing:7px;color:#fff;text-shadow:0 0 18px rgba(0,150,255,0.85),0 0 36px rgba(0,90,220,0.4);margin-top:4px}
.orb-subtitle{font-size:10px;letter-spacing:3.5px;color:#6ab0ee;text-transform:uppercase;margin-top:2px;margin-bottom:4px}
.panel{width:90%;max-width:1200px;margin-top:20px;background:#071827;border-radius:15px;padding:20px}
#chat{height:350px;overflow-y:auto;border:1px solid #123;padding:10px;margin-bottom:10px}
.message{margin-bottom:12px}.user{color:#00bfff}.gerald{color:#00ffcc}
input[type=text]{width:75%;padding:12px;background:#0d1b2a;border:none;color:white;border-radius:10px}
button{padding:12px 20px;border:none;background:#00bfff;color:black;border-radius:10px;cursor:pointer}
.status{margin-top:15px;font-size:14px;color:#9ecfff;white-space:pre-wrap}
img.preview{max-height:120px;margin-top:10px;border-radius:10px}
select{padding:10px;background:#0d1b2a;color:white;border:none;border-radius:10px;margin-bottom:15px}
.status-badge{position:fixed;top:12px;right:16px;background:#16a34a;color:#fff;font-size:11px;font-weight:bold;letter-spacing:1.5px;padding:4px 10px;border-radius:12px;z-index:999}
</style>
</head>
<body>
<div class="status-badge">LIVE</div>
<div class="orb-wrapper">
  <canvas id="orb-canvas" width="300" height="300"></canvas>
  <div class="orb-title">GERALD</div>
  <div class="orb-subtitle">YOUR AI COMMAND BRAIN</div>
</div>
<div class="panel">
<select id="project">
<option>CommuteCoder</option><option>RentMe</option><option>PlantBrain</option><option>MultiMe</option>
</select>
<div id="chat"></div>
<input id="message" type="text" placeholder="Talk to Gerald..." />
<button onclick="sendMessage()">Send</button>
<br><br>
<input type="file" id="imageUpload" accept=".png,.jpg,.jpeg">
<br><img id="preview" class="preview"/>
<div class="status">Status: <span id="statusText">Loading...</span></div>
</div>
<script>
const chat=document.getElementById("chat");
let uploadedImageUrl = "";
function addMessage(sender,text){
 const div=document.createElement("div");
 div.className="message";
 div.innerHTML="<strong class='"+sender+"'>"+sender.toUpperCase()+":</strong> "+text;
 chat.appendChild(div); chat.scrollTop=chat.scrollHeight;
}
async function sendMessage(){
 const input=document.getElementById("message");
 let message=input.value.trim();
 if(!message && !uploadedImageUrl)return;

 if(uploadedImageUrl){
  message = message + "\n\nUploaded image available at: " + uploadedImageUrl + "\nUse this image as visual reference for the task.";
 }

 addMessage("user",message.replace(/\n/g,"<br>"));
 input.value="";

 try{
  const response=await fetch("/start",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
    project:document.getElementById("project").value,
    task:message
   })
  });
  const result=await response.json();
  addMessage("gerald",result.message || JSON.stringify(result));
 }catch(err){
  addMessage("gerald","Connection error: "+err);
 }
}

async function updateStatus(){
 try{
  const response=await fetch("/status");
  const data=await response.json();
  document.getElementById("statusText").innerText=JSON.stringify(data,null,2);
 }catch{document.getElementById("statusText").innerText="Offline";}
}
setInterval(updateStatus,3000); updateStatus();
document.getElementById("imageUpload").addEventListener("change",async function(){
 const file=this.files[0];
 if(!file)return;

 document.getElementById("preview").src=URL.createObjectURL(file);
 addMessage("user","Uploading image: "+file.name);

 const formData=new FormData();
 formData.append("image",file);

 try{
  const response=await fetch("/upload-image",{
   method:"POST",
   body:formData
  });
  const result=await response.json();

  if(result.ok && result.url){
   uploadedImageUrl=result.url;
   addMessage("gerald","Image uploaded successfully: "+uploadedImageUrl);
  }else{
   uploadedImageUrl="";
   addMessage("gerald","Image upload failed: "+JSON.stringify(result));
  }
 }catch(err){
  uploadedImageUrl="";
  addMessage("gerald","Image upload error: "+err);
 }
});

// Gerald Orb Canvas Animation
(function(){
 const canvas=document.getElementById('orb-canvas');
 const ctx=canvas.getContext('2d');
 const W=300,H=300,cx=150,cy=150,SR=70;
 let frame=0;
 // Static star field (deterministic per-session)
 const rng=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
 const stars=Array.from({length:55},(_, i)=>({
  x:rng(i*3+1)*W, y:rng(i*3+2)*H,
  r:rng(i*3+3)*1.15+0.22, a:rng(i*3+4)*0.52+0.18
 }));
 function orbitArc(rx,ry,rot,a0,a1,col,lw,blur){
  ctx.save();
  ctx.translate(cx,cy);ctx.rotate(rot);
  ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,a0,a1);
  ctx.strokeStyle=col;ctx.lineWidth=lw;
  ctx.shadowColor=col;ctx.shadowBlur=blur;
  ctx.stroke();ctx.restore();
 }
 function renderFrame(){
  ctx.clearRect(0,0,W,H);
  // Soft blue nebula
  let g=ctx.createRadialGradient(cx,cy,0,cx,cy,148);
  g.addColorStop(0,'rgba(0,55,215,0.22)');
  g.addColorStop(0.5,'rgba(0,20,115,0.08)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Stars
  for(const s of stars){
   ctx.fillStyle=`rgba(185,215,255,${s.a})`;
   ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
  // Outer bloom — breathes with slow sine
  const breathe=Math.sin(frame*0.024)*0.1+0.9;
  g=ctx.createRadialGradient(cx,cy,SR*0.85,cx,cy,SR*2.75*breathe);
  g.addColorStop(0,'rgba(0,132,255,0.44)');
  g.addColorStop(0.28,'rgba(0,90,230,0.18)');
  g.addColorStop(0.62,'rgba(0,50,180,0.06)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,SR*2.75*breathe,0,Math.PI*2);ctx.fill();
  const t=frame*0.007;
  // Three orbits at different sizes and speeds.
  // Back half = PI..2PI (upper arc in canvas coords = visually behind globe).
  // Front half = 0..PI (lower arc = visually in front of globe).
  const o1rot=t,           o1rx=SR*1.88, o1ry=SR*0.34;
  const o2rot=t*0.72+1.05, o2rx=SR*1.60, o2ry=SR*0.42;
  const o3rot=t*1.28+2.10, o3rx=SR*1.38, o3ry=SR*0.26;
  // Back halves (behind sphere)
  orbitArc(o1rx,o1ry,o1rot,Math.PI,Math.PI*2,'rgba(0,128,240,0.50)',1.7,8);
  orbitArc(o2rx,o2ry,o2rot,Math.PI,Math.PI*2,'rgba(32,142,255,0.45)',1.5,7);
  orbitArc(o3rx,o3ry,o3rot,Math.PI,Math.PI*2,'rgba(0,148,255,0.30)',1.1,5);
  // Main sphere — radial gradient, dark navy edge to bright cyan highlight
  g=ctx.createRadialGradient(cx-SR*0.26,cy-SR*0.27,SR*0.07,cx,cy,SR);
  g.addColorStop(0,'#c8e4ff');
  g.addColorStop(0.17,'#58aaff');
  g.addColorStop(0.46,'#0a62ee');
  g.addColorStop(0.77,'#003ab8');
  g.addColorStop(1,'#001272');
  ctx.fillStyle=g;ctx.shadowColor='#0080ff';ctx.shadowBlur=28;
  ctx.beginPath();ctx.arc(cx,cy,SR,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Sphere surface highlight (top-left glint)
  g=ctx.createRadialGradient(cx-SR*0.2,cy-SR*0.3,0,cx-SR*0.07,cy-SR*0.07,SR*0.74);
  g.addColorStop(0,'rgba(225,242,255,0.30)');
  g.addColorStop(0.5,'rgba(130,195,255,0.07)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,SR,0,Math.PI*2);ctx.fill();
  // G letter
  ctx.font=`bold ${Math.round(SR*0.64)}px Arial,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(160,222,255,0.9)';ctx.shadowBlur=15;
  ctx.fillStyle='rgba(255,255,255,0.97)';
  ctx.fillText('G',cx,cy+2);ctx.shadowBlur=0;
  // Front halves (in front of sphere — brighter)
  orbitArc(o1rx,o1ry,o1rot,0,Math.PI,'rgba(0,195,255,0.92)',2.6,18);
  orbitArc(o2rx,o2ry,o2rot,0,Math.PI,'rgba(75,182,255,0.82)',2.2,14);
  orbitArc(o3rx,o3ry,o3rot,0,Math.PI,'rgba(110,205,255,0.65)',1.6,10);
  frame++;requestAnimationFrame(renderFrame);
 }
 renderFrame();
})();
</script>
</body>
</html>
