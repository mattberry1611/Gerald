name: gerald_app
description: Gerald - Voice-driven AI coding supervisor for commuting
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  speech_to_text: ^7.4.0
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.0
  intl: ^0.18.1
  image_picker: ^1.1.0
  flutter_tts: ^4.0.0
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/gerald_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E1E2E"
  adaptive_icon_foreground: "assets/gerald_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
